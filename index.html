<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="農機管理PRO">
<meta name="theme-color" content="#1a252f">
<title>農機業務管理＆見積 PRO V4</title>
<style>
  :root {
    --bg: #f2f5f7;
    --card-bg: #fff;
    --text: #2c3e50;
    --text-sub: #7f8c8d;
    --border: #eaeff3;
    --main: #2c3e50;
    --input-bg: #f9fafb;
    --table-th: #2c3e50;
  }
  
  body.dark {
    --bg: #121212;
    --card-bg: #1e1e1e;
    --text: #e0e0e0;
    --text-sub: #a0a0a0;
    --border: #333;
    --main: #1a252f;
    --input-bg: #2c2c2c;
    --table-th: #111;
  }
  
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  
  input, textarea, button, select {
    font-family: inherit;
    color: var(--text);
  }
  
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #3498db !important;
    box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
  }
  
  .card {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 13px 15px;
    margin-bottom: 9px;
    cursor: pointer;
    position: relative;
  }
  
  .card:active {
    background: var(--input-bg);
  }
  
  .tab-wrap {
    display: flex;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  
  .tab-wrap::-webkit-scrollbar {
    display: none;
  }
  
  .tab-btn {
    flex: 0 0 auto;
    background: none;
    border: none;
    color: #6fa8c8;
    padding: 9px 12px 10px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 700;
    border-bottom: 3px solid transparent;
  }
  
  .tab-btn.active {
    color: #fff;
    font-weight: 900;
    border-bottom: 3px solid #fff;
  }
  
  .field-label {
    display: block;
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 4px;
    font-weight: 700;
  }
  
  .field-input, .field-textarea, .field-select {
    width: 100%;
    padding: 9px 11px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 13px;
    background: var(--input-bg);
    margin-bottom: 11px;
  }
  
  .field-textarea {
    resize: vertical;
  }
  
  .save-btn {
    flex: 1;
    background: #2980b9;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px 0;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 999;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  
  .modal-box {
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 520px;
    max-height: 92vh;
    overflow-y: auto;
  }
  
  .modal-header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--card-bg);
    z-index: 1;
  }
  
  .badge {
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
  }
  
  .fl {
    display: flex;
    gap: 11px;
    margin-bottom: 10px;
  }
  
  .fg {
    flex: 1;
  }
  
  .dash-card {
    background: linear-gradient(135deg, #2980b9, #2c3e50);
    color: #fff;
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 15px;
  }
  
  .tbl-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  
  table.items {
    width: 100%;
    border-collapse: collapse;
    min-width: 520px;
  }
  
  table.items th {
    background: var(--table-th);
    color: #fff;
    padding: 7px 4px;
    font-size: 11px;
    text-align: center;
    white-space: nowrap;
  }
  
  table.items td {
    padding: 3px 2px;
    border-bottom: 1px solid var(--border);
  }
  
  table.items td input {
    width: 100%;
    border: none;
    background: transparent;
    padding: 5px 4px;
    font-size: 12px;
    border-bottom: 1px dashed var(--border);
  }
  
  .tr { text-align: right; }
  .tc { text-align: center; }
  
  .total-section {
    background: var(--input-bg);
    border-radius: 10px;
    padding: 12px;
    margin-top: 12px;
  }
  
  .total-row {
    display: flex;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 14px;
    color: var(--text);
  }
  
  .total-row.final {
    font-size: 17px;
    font-weight: 900;
    border-top: 2px solid var(--text);
    margin-top: 6px;
    padding-top: 8px;
  }
  
  .action-row {
    display: flex;
    gap: 8px;
    margin: 12px;
  }
  
  .btn-line { background: #06C755; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; flex: 1; }
  .btn-print { background: #e67e22; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; flex: 1; }
  .btn-pdf { background: #e74c3c; color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 800; cursor: pointer; flex: 1; }
  
  #preview-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: #333;
    z-index: 1000;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div id="app" style="display:block;">
  <div style="background:var(--main);padding-top:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2);">
    <div style="display:flex;align-items:center;gap:8px;padding:0 14px 12px">
      <span style="font-size:22px">🚜</span>
      <div style="flex:1">
        <div style="color:#fff;font-weight:900;font-size:16px">農機管理＆見積 PRO</div>
        <div style="color:#6fa8c8;font-size:10px;margin-top:1px">財部農機センター</div>
      </div>
      <button onclick="toggleDark()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">🌓</button>
      <button onclick="openSmartModal()" style="background:#e67e22;border:none;color:#fff;border-radius:10px;padding:7px 11px;font-size:12px;font-weight:800;margin-left:4px">🎤一括</button>
      <button onclick="openApiKey()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:10px;padding:7px 9px;font-size:14px;margin-left:4px">🔑</button>
    </div>
    <div class="tab-wrap" id="tabBar"></div>
  </div>

  <div style="padding:16px 13px 40px" id="content_main"></div>
  
  <div style="padding:16px 13px 40px;display:none;" id="content_quote_editor">
    <button onclick="closeQuoteEditor()" style="background:none;border:none;color:#3498db;font-weight:bold;font-size:14px;margin-bottom:15px;cursor:pointer;">← 見積書一覧に戻る</button>
    
    <div style="background:var(--card-bg);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid var(--border);">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">📋 基本情報</div>
      <div class="fl">
        <div class="fg">
          <label class="field-label">見積番号</label>
          <input class="field-input" id="estNo" placeholder="例: 2026-001">
        </div>
        <div class="fg">
          <label class="field-label">発行日</label>
          <input class="field-input" id="estDate" type="date">
        </div>
      </div>
      <div class="fl">
        <div class="fg">
          <label class="field-label">有効期限</label>
          <input class="field-input" id="expDate" type="date">
        </div>
        <div class="fg">
          <label class="field-label">納入期日</label>
          <input class="field-input" id="delivDate" type="date">
        </div>
      </div>
      <label class="field-label">納入場所</label>
      <input class="field-input" id="delivPlace" placeholder="例: お客様敷地内">
      <label class="field-label">取引方法</label>
      <input class="field-input" id="payMethod" placeholder="例: 現金・振込">
    </div>
    
    <div style="background:var(--card-bg);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid var(--border);">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">👤 宛先・件名</div>
      <label class="field-label">お客様名（様は自動付与）</label>
      <input class="field-input" id="toName" placeholder="例: 田中 太郎">
      <label class="field-label">件名・機械名</label>
      <input class="field-input" id="subject" placeholder="例: トラクター 修理">
    </div>
    
    <div style="background:var(--card-bg);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid var(--border);">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">⚙️ 品目（最大20行）</div>
      <div class="tbl-wrap">
        <table class="items" id="itemsTable">
          <tr>
            <th style="width:28px">No.</th>
            <th style="width:130px">品名</th>
            <th style="width:65px">銘柄</th>
            <th style="width:85px">型式</th>
            <th style="width:42px">数量</th>
            <th style="width:72px">単価</th>
            <th style="width:80px">金額</th>
            <th style="width:80px">備考</th>
          </tr>
        </table>
      </div>
      <div class="total-section">
        <div class="total-row">
          <span>小計</span>
          <span id="subtotal">¥0</span>
        </div>
        <div class="total-row">
          <span>消費税（10%）</span>
          <span id="tax">¥0</span>
        </div>
        <div class="total-row final">
          <span>合計金額</span>
          <span id="total">¥0</span>
        </div>
      </div>
    </div>
    
    <div style="background:var(--card-bg);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid var(--border);">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);">📝 備考</div>
      <textarea class="field-textarea" id="note" rows="3"></textarea>
    </div>
    
    <button class="save-btn" onclick="saveCurrentQuote()" style="width:100%;margin-bottom:10px;">💾 この見積書を保存</button>
    <button class="save-btn" onclick="showPreview()" style="width:100%;background:#e67e22;margin-bottom:15px;">📄 プレビュー・PDF出力</button>
    
    <div style="text-align:center;">
      <button onclick="if(confirm('削除しますか？')){deleteCurrentQuote();}" style="background:none;border:none;color:#e74c3c;text-decoration:underline;cursor:pointer;font-size:12px;">この見積書を削除</button>
    </div>
    <div style="height:20px;"></div>
  </div>
</div>

<div id="preview-modal">
  <div style="background:#1a252f;padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:1001;">
    <button onclick="closePreview()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;">← 戻る</button>
    <span style="color:#fff;font-weight:800;font-size:15px;flex:1;">見積書プレビュー</span>
  </div>
  <div class="action-row">
    <button class="btn-pdf" onclick="savePDF()">💾 PDF保存</button>
    <button class="btn-line" onclick="shareDoc()">📤 LINE共有</button>
    <button class="btn-print" onclick="printDoc()">🖨️ 印刷</button>
  </div>
  <div style="overflow-x:auto;padding:8px;background:#555;">
    <div id="preview-inner" style="background:#fff;margin:0 auto;width:794px;"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle" style="font-size:15px;font-weight:800;color:var(--text)"></h3>
      <button onclick="closeModal()" style="background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--text)">×</button>
    </div>
    <div style="padding:16px 18px 40px" id="modalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="smartModal" style="display:none" onclick="closeSmartOnBg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 style="font-size:15px;font-weight:800;color:var(--text)">🎤 AI音声・一括入力</h3>
      <button onclick="document.getElementById('smartModal').style.display='none'" style="background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--text)">×</button>
    </div>
    <div class="smart-inner">
      <div style="background:#fff8e1;border:1.5px solid #ffe082;border-radius:12px;padding:12px;margin-bottom:12px;">
        <div style="font-size:12px;color:#f57f17;font-weight:800;margin-bottom:4px;">💡 使い方</div>
        <div style="font-size:12px;color:#555;line-height:1.7;">🎤で話す or テキスト入力<br>→ AIが内容から<b>「型式」</b>も自動で聞き取って振り分けます！</div>
      </div>
      <textarea id="smartText" placeholder="ここをタップして🎤で話す、または入力..." rows="4" class="field-textarea"></textarea>
      <button onclick="runSmartAI()" id="smartBtn" class="save-btn" style="width:100%;background:#e67e22;margin-bottom:10px;">🤖 AI自動振り分け・登録</button>
      <div id="smartStatus" style="font-size:12px;margin-top:8px;display:none;padding:10px;border-radius:8px;"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="apiKeyModal" style="display:none" onclick="if(event.target.id==='apiKeyModal')closeApiKey()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 style="font-size:15px;font-weight:800;color:var(--text)">🔑 APIキー設定</h3>
      <button onclick="closeApiKey()" style="background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--text)">×</button>
    </div>
    <div style="padding:16px 18px 40px">
      <label class="field-label">APIキー</label>
      <input type="password" id="apiKeyInput" class="field-input" placeholder="sk-ant-...">
      <button onclick="saveApiKey()" class="save-btn" style="width:100%">保存する</button>
    </div>
  </div>
</div>

<script>
// ── 定数・初期データ ──────────────────────────
const TABS = ["ホーム", "顧客", "修理", "実演", "部品", "製品", "見積書"];
let currentTab = 0;
const STATUS_COLORS = {
  "修理依頼": "#e74c3c", "見積中": "#9b59b6", "部品待ち": "#f39c12", "修理中": "#e67e22", "完了(未請求)": "#3498db", "請求済": "#27ae60",
  "実演予定": "#f39c12", "実施済": "#3498db", "見積提示中": "#9b59b6", "成約": "#27ae60",
  "発注前": "#95a5a6", "発注済": "#e67e22", "入荷済": "#27ae60",
  "商談中": "#9b59b6", "受注": "#3498db", "納品済": "#27ae60"
};

let DB = {
  settings: [{id: 1, targetSales: 10000000, currentSales: 0}],
  customers: [], repairs: [], demos: [], parts: [], products: [], quotes: [] // ★quotesを追加
};

let apiKey = "";

function saveDB() {
  try { localStorage.setItem('agri_db', JSON.stringify(DB)); } catch(e) {}
}

function loadDB() {
  try {
    const d = localStorage.getItem('agri_db');
    if(d) {
      const parsed = JSON.parse(d);
      if(parsed.customers) DB.customers = parsed.customers;
      if(parsed.repairs) DB.repairs = parsed.repairs;
      if(parsed.demos) DB.demos = parsed.demos;
      if(parsed.parts) DB.parts = parsed.parts;
      if(parsed.products) DB.products = parsed.products;
      if(parsed.settings) DB.settings = parsed.settings;
      if(parsed.quotes) DB.quotes = parsed.quotes;
    }
    const k = localStorage.getItem('agri_api_key');
    if(k) apiKey = k;
  } catch(e) {}
}

function openApiKey() { document.getElementById('apiKeyInput').value = apiKey; document.getElementById('apiKeyModal').style.display = 'flex'; }
function closeApiKey() { document.getElementById('apiKeyModal').style.display = 'none'; }
function saveApiKey() { apiKey = document.getElementById('apiKeyInput').value.trim(); try { localStorage.setItem('agri_api_key', apiKey); } catch(e) {} closeApiKey(); alert('APIキーを保存しました'); }

// ── AI機能（型式判別対応） ────────────────────────
async function callAI(prompt) {
  const cleanKey = apiKey.trim();
  if(!cleanKey) throw new Error("APIキーが設定されていません。🔑ボタンから設定してください。");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json", "x-api-key": cleanKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-3-haiku-20240307", max_tokens: 1200, messages: [{role: "user", content: prompt}] })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  const raw = data.content?.[0]?.text || "{}";
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

async function runSmartAI() {
  const text = document.getElementById("smartText").value.trim();
  if(!text) return;
  
  const btn = document.getElementById("smartBtn");
  const statusEl = document.getElementById("smartStatus");
  btn.textContent = "⏳ AIが解析中..."; btn.disabled = true;
  statusEl.style.display = "block";
  statusEl.style.background = "var(--input-bg)"; statusEl.style.color = "var(--text-sub)";
  statusEl.textContent = "AIが内容を解析して振り分けています...";

  const today = new Date().toISOString().slice(0, 10);
  // ★プロンプトに「model(型式)」を追加
  const prompt = `農業機械販売修理会社の業務管理。以下のテキストを解析してJSONで返してください。
テキスト:「${text}」
以下のJSON形式で返してください:
{"customer":{"name":"","phone":"","address":""},"repair":{"customerName":"","machine":"","model":"","attachment":"","hourMeter":"","issue":"","status":"修理依頼","dueDate":""},"demo":{"customerName":"","targetMachine":"","model":"","date":"","status":"実演予定"},"part":{"name":"","partNo":"","qty":0,"status":"発注前","orderDate":""},"product":{"productName":"","maker":"","model":"","customer":"","status":"受注","deliveryDate":""},"hasCustomer":false,"hasRepair":false,"hasDemo":false,"hasPart":false,"hasProduct":false}`;

  try {
    const result = await callAI(prompt);
    const msgs = [];
    
    if(result.hasCustomer && result.customer?.name) {
      DB.customers.push({ id: "ID_" + Date.now(), name: result.customer.name, phone: result.customer.phone || "", address: result.customer.address || "" });
      msgs.push("👥 顧客登録");
    }
    if(result.hasRepair && result.repair?.customerName) {
      DB.repairs.push({ id: "ID_" + (Date.now() + 1), customerName: result.repair.customerName, machine: result.repair.machine || "", model: result.repair.model || "", attachment: result.repair.attachment || "", hourMeter: result.repair.hourMeter || "", issue: result.repair.issue || "", status: result.repair.status || "修理依頼", dueDate: result.repair.dueDate || "", date: today, usedParts: [] });
      msgs.push("🔧 修理依頼登録");
    }
    if(result.hasDemo && result.demo?.customerName) {
      DB.demos.push({ id: "ID_" + (Date.now() + 2), customerName: result.demo.customerName, targetMachine: result.demo.targetMachine || "", model: result.demo.model || "", date: result.demo.date || "", status: result.demo.status || "実演予定" });
      msgs.push("🌾 実演登録");
    }
    if(result.hasPart && result.part?.name) {
      DB.parts.push({ id: "ID_" + (Date.now() + 3), name: result.part.name, partNo: result.part.partNo || "", qty: Number(result.part.qty) || 0, status: result.part.status || "発注前", orderDate: result.part.orderDate || "" });
      msgs.push("⚙️ 部品登録");
    }
    if(result.hasProduct && result.product?.productName) {
      DB.products.push({ id: "ID_" + (Date.now() + 4), productName: result.product.productName, maker: result.product.maker || "", model: result.product.model || "", customer: result.product.customer || "", status: result.product.status || "受注", deliveryDate: result.product.deliveryDate || "" });
      msgs.push("🚜 製品登録");
    }
    
    saveDB();
    document.getElementById("smartText").value = "";
    if(msgs.length > 0) {
      statusEl.style.background = "#f0fff4"; statusEl.style.color = "#27ae60"; statusEl.innerHTML = "✅ " + msgs.join("<br>✅ ");
      renderAll();
    } else {
      statusEl.style.background = "#fff8e1"; statusEl.style.color = "#f57f17"; statusEl.textContent = "⚠️ 振り分けできる情報が見つかりませんでした。";
    }
  } catch(e) {
    statusEl.style.background = "#fde8e8"; statusEl.style.color = "#e74c3c"; statusEl.textContent = "❌ " + e.message;
  }
  btn.textContent = "🤖 AI自動振り分け・登録"; btn.disabled = false;
}

function toggleDark() { document.body.classList.toggle("dark"); }
function openSmartModal() { document.getElementById("smartModal").style.display = "flex"; document.getElementById("smartStatus").style.display = "none"; }
function closeSmartOnBg(e) { if(e.target.id === "smartModal") document.getElementById("smartModal").style.display = "none"; }

function renderAll() {
  let tabsHtml = "";
  for (let i = 0; i < TABS.length; i++) {
    tabsHtml += `<button class="tab-btn ${currentTab === i ? 'active' : ''}" onclick="changeTab(${i})">${TABS[i]}</button>`;
  }
  document.getElementById("tabBar").innerHTML = tabsHtml;
  
  const main = document.getElementById("content_main");
  const quoteEditor = document.getElementById("content_quote_editor");
  
  // 見積書エディターは一旦隠す
  quoteEditor.style.display = "none";
  main.style.display = "block";
    
  if(currentTab === 0) main.innerHTML = renderHome();
  else if(currentTab === 1) main.innerHTML = renderCustomers();
  else if(currentTab === 2) main.innerHTML = renderRepairs();
  else if(currentTab === 3) main.innerHTML = renderDemos();
  else if(currentTab === 4) main.innerHTML = renderPartsTab();
  else if(currentTab === 5) main.innerHTML = renderProducts();
  else if(currentTab === 6) main.innerHTML = renderQuotesList(); // ★見積書一覧
}

function changeTab(i) {
  currentTab = i;
  renderAll();
}

function renderHome() {
  const target = Number(DB.settings[0]?.targetSales || 10000000);
  const current = Number(DB.settings[0]?.currentSales || 0);
  const progress = Math.min((current / target) * 100, 100) || 0;
  const alerts = DB.repairs.filter(r => r.status === "修理依頼" || r.status === "部品待ち" || r.status === "修理中");
  
  let html = `<div class="dash-card"><div style="font-size:12px;opacity:0.8;margin-bottom:5px">事業目標：年間売上 ${(target / 10000).toLocaleString()}万円</div><div style="font-size:24px;font-weight:900;margin-bottom:10px">現在: ¥${current.toLocaleString()}</div><div style="background:rgba(255, 255, 255, 0.2);height:8px;border-radius:4px;overflow:hidden"><div style="background:#f1c40f;width:${progress}%;height:100%;transition:width 0.5s"></div></div><div style="font-size:10px;text-align:right;margin-top:4px">達成率: ${progress.toFixed(1)}%</div></div>`;
  
  if(alerts.length > 0) {
    html += `<h4 style="margin-bottom:10px;color:var(--text)">🔔 修理 要対応 (${alerts.length}件)</h4>`;
    alerts.forEach(a => {
      html += `<div class="card" style="border-left:4px solid #e74c3c" onclick="openEdit('${a.id}',2)"><div style="font-weight:bold;font-size:14px">${a.customerName} - ${a.machine || ''} ${a.model || ''}</div><span class="badge" style="background:${STATUS_COLORS[a.status] || '#95a5a6'};margin-top:6px;display:inline-block">${a.status}</span></div>`;

  }
  return html;
}

// ── 編集モーダル（各タブ用） ────────────────────────
let modalState = null;

function openNew(tab) {
  modalState = {tab, mode: "new", item: {}};
  showModal();
}

function openEdit(id, tab) {
  const keys = ["", "customers", "repairs", "demos", "parts", "products"];
  const item = DB[keys[tab]].find(x => String(x.id) === String(id));
  if(!item) return;
  modalState = {tab, mode: "edit", item: {...item}};
  showModal();
}

function showModal() {
  document.getElementById("modalTitle").innerText = TABS[modalState.tab] + " 詳細";
  let form = "";
  const it = modalState.item;

  if (modalState.tab === 1) {
    form += inp("name", "顧客名", it.name) + inp("phone", "電話番号", it.phone) + inp("address", "住所", it.address);
  } 
  else if (modalState.tab === 2) {
    form += inp("customerName", "顧客名", it.customerName);
    form += `<div class="fl"><div class="fg">` + inp("machine", "機械名", it.machine) + `</div><div class="fg">` + inp("model", "型式", it.model) + `</div></div>`;
    form += sel("status", "ステータス", ["修理依頼", "見積中", "部品待ち", "修理中", "完了(未請求)", "請求済"], it.status);
    form += `<button onclick="jumpToQuote()" class="save-btn" style="background:#8e44ad;width:100%;margin:10px 0;padding:11px;font-size:13px;">📄 見積書を作成</button>`;
  } 
  else if (modalState.tab === 3) {
    form += inp("customerName", "対象顧客", it.customerName);
    form += `<div class="fl"><div class="fg">` + inp("targetMachine", "対象機械", it.targetMachine) + `</div><div class="fg">` + inp("model", "型式", it.model) + `</div></div>`;
    form += sel("status", "ステータス", ["実演予定", "実施済", "見積提示中", "成約"], it.status);
    form += `<button onclick="jumpToQuote()" class="save-btn" style="background:#8e44ad;width:100%;margin:10px 0;padding:11px;font-size:13px;">📄 見積書を作成</button>`;
  } 
  else if (modalState.tab === 4) {
    form += inp("name", "部品名", it.name);
    form += `<div class="fl"><div class="fg">` + inp("partNo", "品番・型式", it.partNo) + `</div><div class="fg">` + inp("qty", "数量", it.qty) + `</div></div>`;
    form += inp("price", "仕入・販売単価", it.price);
    form += `<button onclick="jumpToQuote()" class="save-btn" style="background:#8e44ad;width:100%;margin:10px 0;padding:11px;font-size:13px;">📄 この部品で見積書を作成</button>`;
  } 
  else if (modalState.tab === 5) {
    form += inp("productName", "製品名", it.productName);
    form += `<div class="fl"><div class="fg">` + inp("maker", "メーカー", it.maker) + `</div><div class="fg">` + inp("model", "型式", it.model) + `</div></div>`;
    form += inp("price", "販売額", it.price);
    form += `<button onclick="jumpToQuote()" class="save-btn" style="background:#8e44ad;width:100%;margin:10px 0;padding:11px;font-size:13px;">📄 この製品で見積書を作成</button>`;
  }

  form += `
    <div class="fl" style="margin-top:15px">
      <button class="save-btn" onclick="saveItem()">💾 保存する</button>
      ${modalState.mode === 'edit' ? `<button class="save-btn" style="background:#e74c3c" onclick="delItem()">削除</button>` : ''}
    </div>
  `;
  
  document.getElementById("modalBody").innerHTML = form;
  document.getElementById("modalOverlay").style.display = "flex";
}

function inp(id, label, val) { return `<label class="field-label">${label}</label><input type="text" id="f_${id}" class="field-input" value="${esc(val || '')}">`; }
function sel(id, label, options, currentVal) {
  let optsHtml = "";
  for(let i = 0; i < options.length; i++) { const o = options[i]; const selected = (currentVal === o) ? 'selected' : ''; optsHtml += `<option value="${o}" ${selected}>${o}</option>`; }
  return `<label class="field-label">${label}</label><select id="f_${id}" class="field-select">${optsHtml}</select>`;
}
function esc(s) { return String(s || "").replace(/"/g, "&quot;"); }

function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }
function closeModalOnBg(e) { if (e.target.id === "modalOverlay") closeModal(); }

function saveItem() {
  const keys = ["", "customers", "repairs", "demos", "parts", "products"];
  const dbKey = keys[modalState.tab];
  let item = { id: modalState.mode === "new" ? "ID_" + Date.now() : modalState.item.id };

  const inputs = document.querySelectorAll("#modalBody input, #modalBody select");
  for (let i = 0; i < inputs.length; i++) {
    const el = inputs[i];
    const key = el.id.replace("f_", "");
    if (key) item[key] = el.value;
  }
  if (modalState.mode === "new") DB[dbKey].push(item);
  else DB[dbKey] = DB[dbKey].map(x => String(x.id) === String(item.id) ? item : x);

  saveDB(); closeModal(); renderAll();
}

function delItem() {
  if (!confirm("削除しますか？")) return;
  const keys = ["", "customers", "repairs", "demos", "parts", "products"];
  const dbKey = keys[modalState.tab];
  DB[dbKey] = DB[dbKey].filter(x => String(x.id) !== String(modalState.item.id));
  saveDB(); closeModal(); renderAll();
}

// ── 見積書エディター（保存・連携対応） ────────────────
let currentQuoteId = "";
const ROWS = 20;
let qItems = Array.from({length: ROWS}, () => ({name: "", brand: "", model: "", qty: "", price: "", note: ""}));

// ★各タブから「見積書を作成」ボタンを押したときの処理
function jumpToQuote() {
  const it = modalState.item;
  const tab = modalState.tab;
  
  closeModal();
  
  // 新規の見積書としてエディターを開く
  openQuoteEditor("");

  // 宛名と件名の転記
  if (tab === 2 || tab === 3) document.getElementById("toName").value = it.customerName || "";
  if (tab === 5) document.getElementById("toName").value = it.customer || "";

  // 明細リセット
  qItems = Array.from({length: ROWS}, () => ({name: "", brand: "", model: "", qty: "", price: "", note: ""}));

  // ★「型式(model)」も含めて自動入力！
  if (tab === 2) {
    qItems[0] = {name: it.machine || "", model: it.model || "", qty: 1, price: "", brand: "", note: ""};
  } else if (tab === 3) {
    qItems[0] = {name: it.targetMachine || "", model: it.model || "", qty: 1, price: "", brand: "", note: ""};
  } else if (tab === 4) {
    qItems[0] = {name: it.name || "", model: it.partNo || "", qty: 1, price: it.price || "", brand: "", note: ""};
  } else if (tab === 5) {
    qItems[0] = {name: it.productName || "", model: it.model || "", brand: it.maker || "", qty: 1, price: it.price || "", note: ""};
  }

  buildTable();
}

// 見積書エディターを開く
function openQuoteEditor(id) {
  document.getElementById("content_main").style.display = "none";
  document.getElementById("content_quote_editor").style.display = "block";
  currentTab = 6;
  
  // 見積書タブのボタンをアクティブにする
  const tabs = document.querySelectorAll('.tab-btn');
  tabs.forEach(t => t.classList.remove('active'));
  if(tabs[6]) tabs[6].classList.add('active');

  currentQuoteId = id;
  
  if (id === "") {
    // 新規作成
    const ids = ["estNo", "delivPlace", "payMethod", "toName", "subject", "note"];
    ids.forEach(idx => document.getElementById(idx).value = "");
    document.getElementById("estDate").value = new Date().toISOString().slice(0, 10);
    const exp = new Date(); exp.setMonth(exp.getMonth() + 1);
    document.getElementById("expDate").value = exp.toISOString().slice(0, 10);
    document.getElementById("delivDate").value = "";
    qItems = Array.from({length: ROWS}, () => ({name: "", brand: "", model: "", qty: "", price: "", note: ""}));
  } else {
    // 既存の読み込み
    const q = DB.quotes.find(x => x.id === id);
    if(q) {
      document.getElementById("estNo").value = q.estNo || "";
      document.getElementById("estDate").value = q.estDate || "";
      document.getElementById("expDate").value = q.expDate || "";
      document.getElementById("delivDate").value = q.delivDate || "";
      document.getElementById("delivPlace").value = q.delivPlace || "";
      document.getElementById("payMethod").value = q.payMethod || "";
      document.getElementById("toName").value = q.toName || "";
      document.getElementById("subject").value = q.subject || "";
      document.getElementById("note").value = q.note || "";
      qItems = q.qItems ? JSON.parse(JSON.stringify(q.qItems)) : Array.from({length: ROWS}, () => ({name: "", brand: "", model: "", qty: "", price: "", note: ""}));
    }
  }
  buildTable();
}

function closeQuoteEditor() {
  document.getElementById("content_quote_editor").style.display = "none";
  renderAll(); // 一覧画面に戻る
}

// 見積書をDBに保存
function saveCurrentQuote() {
  let sub = 0;
  for (let i = 0; i < ROWS; i++) {
    sub += (Number(qItems[i].qty) || 0) * (Number(qItems[i].price) || 0);
  }
  const tax = Math.floor(sub * 0.1);
  const total = sub + tax;

  const quoteData = {
    id: currentQuoteId || "Q_" + Date.now(),
    estNo: document.getElementById("estNo").value,
    estDate: document.getElementById("estDate").value,
    expDate: document.getElementById("expDate").value,
    delivDate: document.getElementById("delivDate").value,
    delivPlace: document.getElementById("delivPlace").value,
    payMethod: document.getElementById("payMethod").value,
    toName: document.getElementById("toName").value,
    subject: document.getElementById("subject").value,
    note: document.getElementById("note").value,
    qItems: JSON.parse(JSON.stringify(qItems)),
    total: total
  };

  if (currentQuoteId === "") {
    DB.quotes.push(quoteData);
    currentQuoteId = quoteData.id;
  } else {
    DB.quotes = DB.quotes.map(q => q.id === quoteData.id ? quoteData : q);
  }
  saveDB();
  alert("見積書を保存しました！");
}

function deleteCurrentQuote() {
  if(currentQuoteId !== "") {
    DB.quotes = DB.quotes.filter(q => q.id !== currentQuoteId);
    saveDB();
  }
  closeQuoteEditor();
}

function buildTable() {
  const tbody = document.getElementById("itemsTable");
  while (tbody.rows.length > 1) tbody.deleteRow(1);
  
  for (let i = 0; i < ROWS; i++) {
    const tr = tbody.insertRow();
    tr.innerHTML = `
      <td class="tc" style="font-size:10px;padding:4px 2px;">${i + 1}</td>
      <td><input value="${esc(qItems[i].name)}" onchange="qItems[${i}].name=this.value" placeholder="品名"></td>
      <td><input value="${esc(qItems[i].brand)}" onchange="qItems[${i}].brand=this.value" placeholder="銘柄"></td>
      <td><input value="${esc(qItems[i].model)}" onchange="qItems[${i}].model=this.value" placeholder="型式"></td>
      <td><input type="number" class="tr" value="${qItems[i].qty}" onchange="qItems[${i}].qty=this.value;calcTotal()" min="0"></td>
      <td><input type="number" class="tr" value="${qItems[i].price}" onchange="qItems[${i}].price=this.value;calcTotal()" min="0"></td>
      <td class="tr" id="amt_${i}" style="padding:5px;font-size:12px;font-weight:bold;">—</td>
      <td><input value="${esc(qItems[i].note)}" onchange="qItems[${i}].note=this.value" placeholder="備考"></td>
    `;
  }
  calcTotal();
}

function calcTotal() {
  let sub = 0;
  for (let i = 0; i < ROWS; i++) {
    const qty = Number(qItems[i].qty) || 0;
    const price = Number(qItems[i].price) || 0;
    const amt = qty * price;
    document.getElementById("amt_" + i).textContent = amt ? "¥" + amt.toLocaleString() : "—";
    sub += amt;
  }
  const tax = Math.floor(sub * 0.1);
  document.getElementById("subtotal").textContent = "¥" + sub.toLocaleString();
  document.getElementById("tax").textContent = "¥" + tax.toLocaleString();
  document.getElementById("total").textContent = "¥" + (sub + tax).toLocaleString();
}

// ── プレビュー生成（レイアウト極限チューニング） ────────────────
function getStyles() { 
  return `* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'MS Mincho', 'Hiragino Mincho Pro', serif; } @page { size: A4 portrait; margin: 0; } @media print { body { margin: 0; padding: 0; -webkit-print-color-adjust: exact; color-adjust: exact; } }`; 
}

function fmtDate(d) { 
  if (!d) return ""; const dt = new Date(d); return `令和${dt.getFullYear() - 2018}年${dt.getMonth() + 1}月${dt.getDate()}日`; 
}

function escH(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

function buildEstHTML() {
  const date = document.getElementById("estDate").value;
  const dD = document.getElementById("delivDate").value;
  const dP = document.getElementById("delivPlace").value;
  const pM = document.getElementById("payMethod").value;
  const tN = document.getElementById("toName").value;
  const nt = document.getElementById("note").value;
  const ex = document.getElementById("expDate").value;
  
  let sub = 0;
  let emptyStartIdx = -1;
  const rowH = 7.0; 

  let rowsHTML = "";
  for (let i = 0; i < qItems.length; i++) {
    const item = qItems[i];
    const qty = Number(item.qty) || 0;
    const price = Number(item.price) || 0;
    const amt = qty * price;
    sub += amt;
    
    const isEmpty = !item.name && !item.brand && !item.model && !item.qty && !item.price;
    if (isEmpty && emptyStartIdx === -1) { emptyStartIdx = i; } else if (!isEmpty) { emptyStartIdx = -1; }

    rowsHTML += `
      <tr style="height:${rowH}mm;">
        <td style="border:1px solid #000;text-align:center;font-size:10px;">${i + 1}</td>
        <td style="border:1px solid #000;padding:0 4px;font-size:10px;overflow:hidden;white-space:nowrap;">${escH(item.name)}</td>
        <td style="border:1px solid #000;text-align:center;font-size:10px;">${escH(item.brand)}</td>
        <td style="border:1px solid #000;text-align:center;font-size:10px;">${escH(item.model)}</td>
        <td style="border:1px solid #000;text-align:center;font-size:10px;">${qty || ""}</td>
        <td style="border:1px solid #000;text-align:right;padding-right:4px;font-size:10px;">${price ? price.toLocaleString() : ""}</td>
        <td style="border:1px solid #000;text-align:right;padding-right:4px;font-size:10px;">${amt ? amt.toLocaleString() : ""}</td>
        <td style="border:1px solid #000;padding:0 4px;font-size:10px;overflow:hidden;white-space:nowrap;">${escH(item.note)}</td>
      </tr>
    `;
  }

  const tax = Math.floor(sub * 0.1);
  const total = sub + tax;

  let svgLine = '';
  if (emptyStartIdx !== -1 && emptyStartIdx < ROWS) {
    const topPos = rowH + (emptyStartIdx * rowH); 
    const height = (ROWS - emptyStartIdx) * rowH; 
    svgLine = `<svg style="position:absolute; left:8mm; top:${topPos}mm; width:137mm; height:${height}mm; pointer-events:none; z-index:10;"><line x1="100%" y1="0" x2="0" y2="100%" stroke="#000" stroke-width="1"></line></svg>`;
  }

  let htmlStr = `
<div style="width:210mm;min-height:296mm;padding:12mm 20mm;background:#fff;font-family:'MS Mincho',serif;color:#000;box-sizing:border-box;">

  <div style="text-align:center;font-size:24px;letter-spacing:15mm;margin-bottom:8mm;padding-left:15mm;">見　積　書</div>
  <div style="text-align:right;font-size:10px;margin-bottom:4mm;">${fmtDate(date)}</div>

  <div style="margin-bottom:4mm;">
    <div style="font-size:16px;font-weight:bold;border-bottom:1px solid #000;display:inline-block;padding-bottom:1px;min-width:40mm;text-align:left;margin-bottom:2mm;">
      ${escH(tN)}　様
    </div>
    <div style="font-size:11px;letter-spacing:2px;">下　記　の　通　り　御　見　積　致　し　ま　す　。</div>
  </div>

  <div style="display:flex;justify-content:space-between;margin-bottom:6mm;">
    <div>
      <table style="font-size:10px;border-collapse:collapse;">
        <tr><td style="padding:1px 0;">納入期日</td><td style="border-bottom:1px solid #000;width:35mm;padding:1px 4px;text-align:left;">${fmtDate(dD)}</td></tr>
        <tr><td style="padding:1px 0;">納入場所</td><td style="border-bottom:1px solid #000;width:35mm;padding:1px 4px;text-align:left;">${escH(dP)}</td></tr>
        <tr><td style="padding:1px 0;">取引方法</td><td style="border-bottom:1px solid #000;width:35mm;padding:1px 4px;text-align:left;">${escH(pM)}</td></tr>
      </table>
    </div>
    <div style="font-size:10px;line-height:1.6;">
      鹿児島県曽於市大隅町岩川5591番地<br>そ お 鹿 児 島 農 業 協 同 組 合<br>代表理事組合長　　竹 内　和 久<br><div style="text-align:right;margin-top:1mm;">財部農機センター</div>
    </div>
  </div>

  <div style="display:flex;align-items:flex-end;margin-bottom:2mm;">
    <div style="display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid #000;width:60mm;padding-bottom:1px;">
      <div style="font-size:16px;font-weight:bold;">合計金額 ￥</div>
      <div style="text-align:right;flex:1;">
        <span style="font-size:18px;font-weight:bold;">${total.toLocaleString()}</span>
        <span style="font-size:16px;font-weight:bold;"> 円也</span>
      </div>
    </div>
    <div style="font-size:10px;margin-left:4mm;padding-bottom:1px;">（内消費税　${tax.toLocaleString()}　円）</div>
  </div>

  <div style="position:relative; width:170mm; margin-top:3mm;">
    ${svgLine}
    <table style="width:170mm;border-collapse:collapse;table-layout:fixed;">
      <colgroup><col style="width:8mm"><col style="width:45mm"><col style="width:15mm"><col style="width:25mm"><col style="width:12mm"><col style="width:20mm"><col style="width:20mm"><col style="width:25mm"></colgroup>
      <tr style="height:${rowH}mm;background:#fff;">
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">No.</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">品　　名</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">銘　柄</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">型　　式</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">数量</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">単　価</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">金　額</th>
        <th style="border:1px solid #000;font-size:10px;font-weight:normal;">備　考</th>
      </tr>
      ${rowsHTML}
      <tr style="height:${rowH}mm;"><td colspan="6" style="border:1px solid #000;text-align:center;font-size:11px;letter-spacing:10mm;padding-left:10mm;">小　計</td><td style="border:1px solid #000;text-align:right;padding-right:4px;font-size:10px;">${sub.toLocaleString()}</td><td style="border:1px solid #000;"></td></tr>
      <tr style="height:${rowH}mm;"><td colspan="6" style="border:1px solid #000;text-align:center;font-size:11px;letter-spacing:8mm;padding-left:8mm;">消　費　税</td><td style="border:1px solid #000;text-align:right;padding-right:4px;font-size:10px;">${tax.toLocaleString()}</td><td style="border:1px solid #000;"></td></tr>
      <tr style="height:${rowH}mm;"><td colspan="6" style="border:1px solid #000;text-align:center;font-size:11px;letter-spacing:10mm;padding-left:10mm;">合　計</td><td style="border:1px solid #000;text-align:right;padding-right:4px;font-size:10px;font-weight:bold;">${total.toLocaleString()}</td><td style="border:1px solid #000;"></td></tr>
    </table>
  </div>
  `;
  if (nt) htmlStr += `<div style="margin-top:3mm;font-size:10px;border:0.5px solid #ccc;padding:4px 6px;"><strong>備考：</strong>${escH(nt)}</div>`;
  if (ex) htmlStr += `<div style="margin-top:2mm;font-size:10px;">有効期限：${fmtDate(ex)}</div>`;
  htmlStr += `</div>`;
  
  return htmlStr;
}

// ── 出力系アクション ──────────────────────────
function showPreview() { document.getElementById("preview-inner").innerHTML = buildEstHTML(); document.getElementById("preview-modal").style.display = "block"; }
function closePreview() { document.getElementById("preview-modal").style.display = "none"; }
function printDoc() { const win = window.open('', '_blank'); win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${getStyles()}</style></head><body>${buildEstHTML()}</body></html>`); win.document.close(); setTimeout(() => { win.print(); }, 600); }
function savePDF() { printDoc(); }
function shareDoc() { alert("LINEで共有する機能（実装例）"); }

// ── 起動処理 ──────────────────────────────────
window.onload = () => {
  loadDB();
  initQuote(); // 初期表示用
  renderAll();
};
</script>
