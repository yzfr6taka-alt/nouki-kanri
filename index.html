<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="農機管理PRO">
<meta name="theme-color" content="#1a252f">
<title>農機業務管理＆見積 PRO V4</title>
<style>
:root{--bg:#f2f5f7;--card-bg:#fff;--text:#2c3e50;--text-sub:#7f8c8d;--border:#eaeff3;--main:#2c3e50;--input-bg:#f9fafb;--table-th:#2c3e50;}
body.dark{--bg:#121212;--card-bg:#1e1e1e;--text:#e0e0e0;--text-sub:#a0a0a0;--border:#333;--main:#1a252f;--input-bg:#2c2c2c;--table-th:#111;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);max-width:520px;margin:0 auto;min-height:100vh;transition:background 0.3s,color 0.3s;}
input,textarea,button,select{font-family:inherit;color:var(--text);}
input:focus,textarea:focus,select:focus{outline:none;border-color:#3498db!important;box-shadow:0 0 0 3px rgba(52,152,219,0.15);}
.card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px;cursor:pointer;}
.card:active{background:var(--input-bg);}
.tab-wrap{display:flex;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.tab-wrap::-webkit-scrollbar{display:none;}
.tab-btn{flex:0 0 auto;background:none;border:none;color:#6fa8c8;padding:9px 12px 10px;font-size:11px;cursor:pointer;font-weight:700;border-bottom:3px solid transparent;}
.tab-btn.active{color:#fff;font-weight:900;border-bottom:3px solid #fff;}
.field-label{display:block;font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:700;}
.field-input,.field-textarea,.field-select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--input-bg);margin-bottom:11px;}
.field-textarea{resize:vertical;}
.save-btn{flex:1;background:#2980b9;color:#fff;border:none;border-radius:10px;padding:13px 0;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:999;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:var(--card-bg);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
.modal-header{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card-bg);z-index:1;}
.badge{border-radius:12px;padding:2px 10px;font-size:11px;font-weight:700;color:#fff;}
.fl{display:flex;gap:11px;margin-bottom:10px;}
.fg{flex:1;}
.dash-card{background:linear-gradient(135deg,#2980b9,#2c3e50);color:#fff;border-radius:14px;padding:16px;margin-bottom:15px;}
.section-box{background:rgba(0,0,0,0.03);border:1px dashed #ccc;padding:12px;border-radius:10px;margin-bottom:12px;}
body.dark .section-box{background:rgba(255,255,255,0.05);border-color:#555;}
.chk-label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:bold;cursor:pointer;margin-bottom:8px;}
.section{background:var(--card-bg);border-radius:14px;padding:16px;margin-bottom:12px;border:1.5px solid var(--border);}
.section-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.items{width:100%;border-collapse:collapse;min-width:520px;}
table.items th{background:var(--table-th);color:#fff;padding:7px 4px;font-size:11px;text-align:center;white-space:nowrap;}
table.items td{padding:3px 2px;border-bottom:1px solid var(--border);}
table.items td input{width:100%;border:none;background:transparent;padding:5px 4px;font-size:12px;border-bottom:1px dashed var(--border);}
table.items td input:focus{border-bottom:2px solid #3498db;outline:none;box-shadow:none;}
.tr{text-align:right;}.tc{text-align:center;}
.total-section{background:var(--input-bg);border-radius:10px;padding:12px;margin-top:12px;}
.total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;color:var(--text);}
.total-row.final{font-size:17px;font-weight:900;border-top:2px solid var(--text);margin-top:6px;padding-top:8px;}
.btn-create{display:block;width:100%;background:#2c3e50;color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;}
.action-row{display:flex;gap:8px;margin:12px;}
.btn-line{background:#06C755;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;flex:1;}
.btn-print{background:#e67e22;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;flex:1;}
.btn-pdf{background:#e74c3c;color:#fff;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;flex:1;}
#preview-modal{display:none;position:fixed;inset:0;background:#333;z-index:1000;overflow-y:auto;}
#smartModal .modal-box{padding:0;}
.smart-inner{padding:16px 18px 40px;}
.parts-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.parts-row input{flex:1;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--input-bg);}
.parts-row .del-btn{background:#e74c3c;color:#fff;border:none;border-radius:8px;padding:7px 10px;font-size:12px;cursor:pointer;white-space:nowrap;}
.add-parts-btn{width:100%;background:var(--input-bg);border:1.5px dashed var(--border);border-radius:8px;padding:8px;font-size:12px;color:var(--text-sub);cursor:pointer;margin-bottom:10px;}
</style>
</head>
<body>

<div id="app" style="display:block;">
  <div style="background:var(--main);padding-top:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2);">
    <div style="display:flex;align-items:center;gap:8px;padding:0 14px 12px">
      <span style="font-size:22px">🚜</span>
      <div style="flex:1">
        <div style="color:#fff;font-weight:900;font-size:16px">農機管理＆見積 PRO</div>
        <div style="color:#6fa8c8;font-size:10px;margin-top:1px">財部農機センター</div>
      </div>
      <button onclick="toggleDark()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">🌓</button>
      <button onclick="openSmartModal()" style="background:#e67e22;border:none;color:#fff;border-radius:10px;padding:7px 11px;font-size:12px;font-weight:800;margin-left:4px">🎤一括</button>
      <button onclick="openApiKey()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:10px;padding:7px 9px;font-size:14px;margin-left:4px">🔑</button>
    </div>
    <div class="tab-wrap" id="tabBar"></div>
  </div>

  <div style="padding:16px 13px 40px" id="content_main"></div>
  <div style="padding:16px 13px 40px;display:none;" id="content_quote">
    <div class="section">
      <div class="section-title">📋 基本情報</div>
      <div class="fl"><div class="fg"><label class="field-label">見積番号</label><input class="field-input" id="estNo" placeholder="例: 2026-001"></div><div class="fg"><label class="field-label">発行日</label><input class="field-input" id="estDate" type="date"></div></div>
      <div class="fl"><div class="fg"><label class="field-label">有効期限</label><input class="field-input" id="expDate" type="date"></div><div class="fg"><label class="field-label">納入期日</label><input class="field-input" id="delivDate" type="date"></div></div>
      <label class="field-label">納入場所</label><input class="field-input" id="delivPlace" placeholder="例: お客様敷地内">
      <label class="field-label">取引方法</label><input class="field-input" id="payMethod" placeholder="例: 現金・振込">
    </div>
    <div class="section">
      <div class="section-title">👤 宛先・件名</div>
      <label class="field-label">お客様名（様は自動付与）</label><input class="field-input" id="toName" placeholder="例: 田中 太郎">
      <label class="field-label">件名・機械名</label><input class="field-input" id="subject" placeholder="例: トラクター 修理">
    </div>
    <div class="section">
      <div class="section-title">⚙️ 品目（最大20行）</div>
      <div class="tbl-wrap">
        <table class="items" id="itemsTable">
          <tr><th style="width:28px">No.</th><th style="width:130px">品名</th><th style="width:65px">銘柄</th><th style="width:85px">型式</th><th style="width:42px">数量</th><th style="width:72px">単価</th><th style="width:80px">金額</th><th style="width:80px">備考</th></tr>
        </table>
      </div>
      <div class="total-section">
        <div class="total-row"><span>小計</span><span id="subtotal">¥0</span></div>
        <div class="total-row"><span>消費税（10%）</span><span id="tax">¥0</span></div>
        <div class="total-row final"><span>合計金額</span><span id="total">¥0</span></div>
      </div>
    </div>
    <div class="section"><div class="section-title">📝 備考</div><textarea class="field-textarea" id="note" rows="3"></textarea></div>
    <button class="btn-create" onclick="showPreview()">📄 見積書プレビュー・出力</button>
    <div style="text-align:center;margin-top:15px;"><button onclick="clearQuote()" style="background:none;border:none;color:var(--text-sub);text-decoration:underline;cursor:pointer;font-size:12px;">入力をクリアする</button></div>
    <div style="height:20px;"></div>
  </div>
</div>

<!-- 見積書プレビュー -->
<div id="preview-modal">
  <div style="background:#1a252f;padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:10;">
    <button onclick="closePreview()" style="background:rgba(255,255,255,0.15);border:none;color:#fff;border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer;">← 戻る</button>
    <span style="color:#fff;font-weight:800;font-size:15px;flex:1;">見積書プレビュー</span>
  </div>
  <div class="action-row">
    <button class="btn-pdf" onclick="savePDF()">💾 PDF保存</button>
    <button class="btn-line" onclick="shareDoc()">📤 LINE共有</button>
    <button class="btn-print" onclick="printDoc()">🖨️ 印刷</button>
  </div>
  <div style="overflow-x:auto;padding:8px;background:#555;">
    <div id="preview-inner" style="background:#fff;margin:0 auto;width:794px;"></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModalOnBg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle" style="font-size:15px;font-weight:800;color:var(--text)"></h3>
      <button onclick="closeModal()" style="background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--text)">×</button>
    </div>
    <div style="padding:16px 18px 40px" id="modalBody"></div>
  </div>
</div>

<!-- スマートAI入力モーダル -->
<div class="modal-overlay" id="smartModal" style="display:none" onclick="closeSmartOnBg(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 style="font-size:15px;font-weight:800;color:var(--text)">🎤 AI音声・一括入力</h3>
      <button onclick="document.getElementById('smartModal').style.display='none'" style="background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--text)">×</button>
    </div>
    <div class="smart-inner">
      <div style="background:#fff8e1;border:1.5px solid #ffe082;border-radius:12px;padding:12px;margin-bottom:12px;">
        <div style="font-size:12px;color:#f57f17;font-weight:800;margin-bottom:4px;">💡 使い方</div>
        <div style="font-size:12px;color:#555;line-height:1.7;">キーボードの🎤で話す or テキスト入力<br>→ AIが顧客・修理・実演・部品・製品に自動振り分け！<br><span style="color:#888;">例：「曽於市の田中さん、クボタトラクターKL34のエンジンオイル交換、アワー1200h、エレメント2個発注」</span></div>
      </div>
      <textarea id="smartText" placeholder="ここをタップして🎤で話す、またはキーボードで入力..." rows="4" class="field-textarea"></textarea>
      <button onclick="runSmartAI()" id="smartBtn" class="save-btn" style="width:100%;background:#e67e22;margin-bottom:10px;">🤖 AI自動振り分け・登録</button>
      <div id="smartStatus" style="font-size:12px;margin-top:8px;display:none;padding:10px;border-radius:8px;"></div>
    </div>
  </div>
</div>

<!-- APIキーモーダル -->
<div class="modal-overlay" id="apiKeyModal" style="display:none" onclick="if(event.target.id==='apiKeyModal')closeApiKey()">
  <div class="modal-box">
    <div class="modal-header">
      <h3 style="font-size:15px;font-weight:800;color:var(--text)">🔑 APIキー設定</h3>
      <button onclick="closeApiKey()" style="background:var(--border);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;cursor:pointer;color:var(--text)">×</button>
    </div>
    <div style="padding:16px 18px 40px">
      <div style="font-size:12px;color:var(--text-sub);margin-bottom:12px;">AI一括入力機能を使うにはAnthropicのAPIキーが必要です。</div>
      <label class="field-label">APIキー</label>
      <input type="password" id="apiKeyInput" class="field-input" placeholder="sk-ant-...">
      <button onclick="saveApiKey()" class="save-btn" style="width:100%">保存する</button>
    </div>
  </div>
</div>

<script>
// ── 定数・初期データ ──────────────────────────
const TABS = ["ホーム","顧客","修理","実演","部品","製品","見積書"];
let currentTab = 0;
const STATUS_COLORS = {
  "修理依頼":"#e74c3c","見積中":"#9b59b6","部品待ち":"#f39c12","修理中":"#e67e22","完了(未請求)":"#3498db","請求済":"#27ae60",
  "実演予定":"#f39c12","実施済":"#3498db","見積提示中":"#9b59b6","成約":"#27ae60",
  "発注前":"#95a5a6","発注済":"#e67e22","入荷済":"#27ae60",
  "商談中":"#9b59b6","受注":"#3498db","納品済":"#27ae60"
};

let DB = {
  settings:[{id:1,targetSales:10000000,currentSales:0}],
  customers:[],repairs:[],demos:[],parts:[],products:[]
};

let apiKey = "";

// ── localStorage ─────────────────────────────
function saveDB(){
  try{ localStorage.setItem('agri_db', JSON.stringify(DB)); }catch(e){}
}
function loadDB(){
  try{
    const d = localStorage.getItem('agri_db');
    if(d){
      const parsed = JSON.parse(d);
      // マージ（既存キーを保持しつつ更新）
      if(parsed.customers) DB.customers = parsed.customers;
      if(parsed.repairs) DB.repairs = parsed.repairs;
      if(parsed.demos) DB.demos = parsed.demos;
      if(parsed.parts) DB.parts = parsed.parts;
      if(parsed.products) DB.products = parsed.products;
      if(parsed.settings) DB.settings = parsed.settings;
    }
    const k = localStorage.getItem('agri_api_key');
    if(k) apiKey = k;
  }catch(e){}
}

// ── APIキー ───────────────────────────────────
function openApiKey(){
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('apiKeyModal').style.display = 'flex';
}
function closeApiKey(){ document.getElementById('apiKeyModal').style.display = 'none'; }
function saveApiKey(){
  apiKey = document.getElementById('apiKeyInput').value.trim();
  try{ localStorage.setItem('agri_api_key', apiKey); }catch(e){}
  closeApiKey();
  alert('APIキーを保存しました');
}

// ── AI解析 ────────────────────────────────────
async function callAI(prompt){
  const cleanKey = apiKey.trim();
  if(!cleanKey) throw new Error("APIキーが設定されていません。🔑ボタンから設定してください。");
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":cleanKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:1200,messages:[{role:"user",content:prompt}]})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  const raw = data.content?.[0]?.text || "{}";
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function runSmartAI(){
  const text = document.getElementById("smartText").value.trim();
  if(!text) return;
  const btn = document.getElementById("smartBtn");
  const statusEl = document.getElementById("smartStatus");
  btn.textContent = "⏳ AIが解析中..."; btn.disabled = true;
  statusEl.style.display = "block";
  statusEl.style.background = "var(--input-bg)";
  statusEl.style.color = "var(--text-sub)";
  statusEl.textContent = "AIが内容を解析して振り分けています...";

  const today = new Date().toISOString().slice(0,10);
  const customerNames = DB.customers.map(c=>c.name).join("、");

  const prompt = `農業機械販売修理会社の業務管理。以下のテキストを解析してJSONで返してください。
今日:${today} 既存顧客:${customerNames}
テキスト:「${text}」

以下のJSON形式で返してください:
{"customer":{"name":"","phone":"","address":""},"repair":{"customerName":"","machine":"","attachment":"","hourMeter":"","issue":"","status":"修理依頼","dueDate":""},"demo":{"customerName":"","targetMachine":"","date":"","status":"実演予定"},"part":{"name":"","partNo":"","qty":0,"status":"発注前","orderDate":""},"product":{"productName":"","maker":"","customer":"","status":"受注","deliveryDate":""},"hasCustomer":false,"hasRepair":false,"hasDemo":false,"hasPart":false,"hasProduct":false}
ルール:顧客名があればhasCustomer:true、修理・点検等があればhasRepair:true、実演・デモがあればhasDemo:true、部品・消耗品発注があればhasPart:true、製品販売・受注があればhasProduct:true、日付はYYYY-MM-DD形式、JSONのみ返答`;

  try{
    const result = await callAI(prompt);
    const msgs = [];
    if(result.hasCustomer && result.customer?.name){
      const exists = DB.customers.find(c=>c.name===result.customer.name);
      if(!exists){
        const item = {id:"ID_"+Date.now(),name:result.customer.name,phone:result.customer.phone||"",address:result.customer.address||""};
        DB.customers.push(item);
        msgs.push("👥 顧客「"+result.customer.name+"」登録");
      }else msgs.push("👥 顧客「"+result.customer.name+"」既存");
    }
    if(result.hasRepair && result.repair?.customerName){
      const item = {id:"ID_"+(Date.now()+1),customerName:result.repair.customerName,machine:result.repair.machine||"",attachment:result.repair.attachment||"",hourMeter:result.repair.hourMeter||"",issue:result.repair.issue||"",status:result.repair.status||"修理依頼",dueDate:result.repair.dueDate||"",date:today,usedParts:[]};
      DB.repairs.push(item);
      msgs.push("🔧 修理依頼登録");
    }
    if(result.hasDemo && result.demo?.customerName){
      const item = {id:"ID_"+(Date.now()+2),customerName:result.demo.customerName,targetMachine:result.demo.targetMachine||"",date:result.demo.date||"",status:result.demo.status||"実演予定"};
      DB.demos.push(item);
      msgs.push("🌾 実演登録");
    }
    if(result.hasPart && result.part?.name){
      const item = {id:"ID_"+(Date.now()+3),name:result.part.name,partNo:result.part.partNo||"",qty:Number(result.part.qty)||0,status:result.part.status||"発注前",orderDate:result.part.orderDate||""};
      DB.parts.push(item);
      msgs.push("⚙️ 部品登録");
    }
    if(result.hasProduct && result.product?.productName){
      const item = {id:"ID_"+(Date.now()+4),productName:result.product.productName,maker:result.product.maker||"",customer:result.product.customer||"",status:result.product.status||"受注",deliveryDate:result.product.deliveryDate||""};
      DB.products.push(item);
      msgs.push("🚜 製品登録");
    }
    saveDB();
    document.getElementById("smartText").value = "";
    if(msgs.length > 0){
      statusEl.style.background = "#f0fff4"; statusEl.style.color = "#27ae60";
      statusEl.innerHTML = "✅ " + msgs.join("<br>✅ ");
      renderAll();
    }else{
      statusEl.style.background = "#fff8e1"; statusEl.style.color = "#f57f17";
      statusEl.textContent = "⚠️ 振り分けできる情報が見つかりませんでした。";
    }
  }catch(e){
    statusEl.style.background = "#fde8e8"; statusEl.style.color = "#e74c3c";
    statusEl.textContent = "❌ " + e.message;
  }
  btn.textContent = "🤖 AI自動振り分け・登録"; btn.disabled = false;
}

// ── UI ───────────────────────────────────────
function toggleDark(){ document.body.classList.toggle("dark"); }
function openSmartModal(){ document.getElementById("smartModal").style.display="flex"; document.getElementById("smartStatus").style.display="none"; }
function closeSmartOnBg(e){ if(e.target.id==="smartModal") document.getElementById("smartModal").style.display="none"; }

function renderAll(){
  document.getElementById("tabBar").innerHTML = TABS.map((t,i)=>
    `<button class="tab-btn ${currentTab===i?'active':''}" onclick="changeTab(${i})">${t}</button>`
  ).join('');
  const main = document.getElementById("content_main");
  const quote = document.getElementById("content_quote");
  if(currentTab === 6){
    main.style.display = "none"; quote.style.display = "block";
  }else{
    quote.style.display = "none"; main.style.display = "block";
    if(currentTab===0) main.innerHTML = renderHome();
    else if(currentTab===1) main.innerHTML = renderCustomers();
    else if(currentTab===2) main.innerHTML = renderRepairs();
    else if(currentTab===3) main.innerHTML = renderDemos();
    else if(currentTab===4) main.innerHTML = renderPartsTab();
    else if(currentTab===5) main.innerHTML = renderProducts();
  }
}
function changeTab(i){ currentTab=i; renderAll(); }

function renderHome(){
  const target = Number(DB.settings[0]?.targetSales||10000000);

  const progress = Math.min((current/target)*100,100)||0;
  const alerts = DB.repairs.filter(r=>r.status==="修理依頼"||r.status==="部品待ち"||r.status==="修理中");

  return`<div class="dash-card">
    <div style="font-size:12px;opacity:0.8;margin-bottom:5px">事業目標：年間売上 ${(target/10000).toLocaleString()}万円</div>
    <div style="font-size:24px;font-weight:900;margin-bottom:10px">現在: ¥${current.toLocaleString()}</div>
    <div style="background:rgba(255,255,255,0.2);height:8px;border-radius:4px;overflow:hidden"><div style="background:#f1c40f;width:${progress}%;height:100%;transition:width 0.5s"></div></div>

      目標変更: <input type="number" value="${target}" onchange="DB.settings[0].targetSales=Number(this.value);saveDB();renderAll()" style="width:120px;background:rgba(255,255,255,0.2);border:none;border-bottom:1px solid rgba(255,255,255,0.5);color:#fff;padding:2px 4px;font-size:11px;">円
    </div>
  </div>
  ${alerts.length>0?`<h4 style="margin-bottom:10px;color:var(--text)">🔔 修理 要対応 (${alerts.length}件)</h4>`:''}
  ${alerts.map(a=>`<div class="card" style="border-left:4px solid #e74c3c" onclick="openEdit('${a.id}',2)">
    <div style="font-weight:bold;font-size:14px">${a.customerName} - ${a.machine||''}</div>
    <div style="font-size:12px;color:var(--text-sub);margin-top:3px">${a.issue||''} ${a.hourMeter?'/ '+a.hourMeter+'h':''}</div>
    <span class="badge" style="background:${STATUS_COLORS[a.status]||'#95a5a6'};margin-top:6px;display:inline-block">${a.status}</span>

  ${demoAlerts.length>0?`<h4 style="margin:10px 0;color:var(--text)">🌾 実演予定 (${demoAlerts.length}件)</h4>`:''}
  ${demoAlerts.map(d=>`<div class="card" style="border-left:4px solid #f39c12" onclick="openEdit('${d.id}',3)">
    <div style="font-weight:bold;font-size:14px">${d.customerName} - ${d.targetMachine||''}</div>
    <div style="font-size:12px;color:var(--text-sub);margin-top:3px">予定日: ${d.date||'未定'}</div>
  </div>`).join('')}
  <div style="margin-top:10px;display:flex;gap:8px;">
    <button onclick="changeTab(2)" class="save-btn" style="font-size:12px;padding:10px 0">🔧 修理 ${DB.repairs.length}件</button>
    <button onclick="changeTab(3)" class="save-btn" style="background:#f39c12;font-size:12px;padding:10px 0">🌾 実演 ${DB.demos.length}件</button>
    <button onclick="changeTab(5)" class="save-btn" style="background:#27ae60;font-size:12px;padding:10px 0">🚜 製品 ${DB.products.length}件</button>

// ── モーダル ─────────────────────────────────
let modalState = null;
// 修理モーダル用の使用部品リスト
let tempUsedParts = [];

function openNew(tab){ modalState={tab,mode:"new",item:{}}; showModal(); }
function openEdit(id,tab){
  const keys = ["","customers","repairs","demos","parts","products"];
  const item = DB[keys[tab]].find(x=>String(x.id)===String(id));
  if(!item) return;
  modalState = {tab,mode:"edit",item:{...item}};
  showModal();
}

function showModal(){
  document.getElementById("modalTitle").innerText = TABS[modalState.tab]+" 詳細";
  let form = "";
  const it = modalState.item;

  if(modalState.tab===1){
    // 顧客
    form = inp("name","顧客名",it.name) + inp("phone","電話番号",it.phone) + inp("address","住所",it.address);
    form += `<label class="field-label">メモ</label><textarea id="f_memo" class="field-textarea" rows="2">${it.memo||''}</textarea>`;
  }
  else if(modalState.tab===2){
    // 修理
    tempUsedParts = it.usedParts ? JSON.parse(JSON.stringify(it.usedParts)) : [];
    form = inp("customerName","顧客名",it.customerName) + inp("machine","機械・型式",it.machine);
    form += inp("attachment","アタッチメント(作業機)",it.attachment,"","RMR8-PRJ など");
    form += `<div class="fl">` + inp("hourMeter","アワーメーター(h)",it.hourMeter) + sel("status","ステータス",["修理依頼","見積中","部品待ち","修理中","完了(未請求)","請求済"],it.status) + `</div>`;
    form += `<label class="field-label">症状・内容</label><textarea id="f_issue" class="field-textarea" rows="2">${it.issue||''}</textarea>`;
    form += `<div class="fl"><div class="fg"><label class="field-label">受付日</label><input type="date" id="f_date" class="field-input" value="${it.date||''}"></div><div class="fg"><label class="field-label">納期</label><input type="date" id="f_dueDate" class="field-input" value="${it.dueDate||''}"></div></div>`;
    // スマート農機
    form += `<div class="section-box"><div style="font-size:12px;font-weight:bold;color:#e67e22;margin-bottom:6px">📡 スマート農機設定</div>` + inp("smartSystem","システム名",it.smartSystem,"","CHCNAV等") + `<div class="fl">` + inp("ntripInfo","Ntrip ID/PW",it.ntripInfo) + inp("antenna","アンテナ高",it.antenna) + `</div></div>`;
    // 使用部品セクション
    form += `<div class="section-box">
      <div style="font-size:12px;font-weight:bold;color:#2980b9;margin-bottom:8px">🔩 使用部品・交換部品</div>
      <div id="usedPartsList">${renderUsedPartsList()}</div>
      <button type="button" class="add-parts-btn" onclick="addUsedPart()">＋ 部品を追加</button>
    </div>`;
    // SNS
    form += `<div class="section-box"><label class="chk-label"><input type="checkbox" id="f_sns_ok" ${it.sns_ok?'checked':''}> 📷 掲載許可済・インスタネタ</label><textarea id="f_sns_memo" class="field-textarea" rows="2">${it.sns_memo||''}</textarea></div>`;
    form += `<button onclick="jumpToQuote()" style="width:100%;background:#8e44ad;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:11px;">📄 見積書を作成</button>`;
    form += `<label class="field-label">メモ</label><textarea id="f_memo" class="field-textarea" rows="2">${it.memo||''}</textarea>`;
  }
  else if(modalState.tab===3){
    // 実演
    form = inp("customerName","対象顧客・見込み客",it.customerName) + inp("mapUrl","実演場所URL",it.mapUrl);
    form += `<div class="fl">` + inp("date","実施予定日",it.date,"date") + sel("status","ステータス",["実演予定","実施済","見積提示中","成約"],it.status) + `</div>`;
    form += inp("targetMachine","実演対象機械",it.targetMachine);
    form += `<label class="field-label">フィードバック・反応</label><textarea id="f_reaction" class="field-textarea" rows="2">${it.reaction||''}</textarea>`;
    form += `<div class="section-box"><div style="font-size:12px;font-weight:bold;color:#27ae60;margin-bottom:6px">♻️ 下取り査定メモ</div>` + inp("tradeInMachine","下取り機 型式",it.tradeInMachine) + `<div class="fl">` + inp("tradeInHour","アワー(h)",it.tradeInHour) + inp("tradeInPrice","概算査定額(円)",it.tradeInPrice) + `</div><label class="field-label">外観メモ</label><textarea id="f_tradeInMemo" class="field-textarea" rows="2">${it.tradeInMemo||''}</textarea></div>`;
    form += `<button onclick="jumpToQuote()" style="width:100%;background:#8e44ad;color:#fff;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:11px;">📄 この案件の見積書を作成</button>`;
  }
  else if(modalState.tab===4){
    // 部品
    form = inp("name","部品名",it.name) + `<div class="fl">` + inp("partNo","品番",it.partNo) + inp("qty","在庫数",it.qty) + `</div>` + inp("price","仕入単価(円)",it.price) + sel("status","ステータス",["発注前","発注済","入荷済"],it.status) + inp("orderDate","発注日",it.orderDate,"date") + inp("supplier","仕入先",it.supplier);
    form += `<label class="field-label">メモ</label><textarea id="f_memo" class="field-textarea" rows="2">${it.memo||''}</textarea>`;
  }
  else if(modalState.tab===5){
    // 製品
    form = inp("productName","販売製品名",it.productName) + `<div class="fl">` + inp("maker","メーカー",it.maker) + inp("price","販売額(円)",it.price) + `</div>` + inp("customer","顧客名",it.customer) + sel("status","ステータス",["商談中","受注","納品済"],it.status) + inp("deliveryDate","納期",it.deliveryDate,"date");
    form += inp("serialNo","シリアル番号",it.serialNo) + `<label class="field-label">備考</label><textarea id="f_memo" class="field-textarea" rows="2">${it.memo||''}</textarea>`;
  }

  form += `<div class="fl" style="margin-top:15px"><button id="saveItemBtn" class="save-btn" onclick="saveItem()">💾 保存する</button>${modalState.mode==='edit'?'<button class="save-btn" style="background:#e74c3c" onclick="delItem()">削除</button>':''}</div>`;
  document.getElementById("modalBody").innerHTML = form;
  document.getElementById("modalOverlay").style.display = "flex";
}

// ── 使用部品 ──────────────────────────────────
function renderUsedPartsList(){
  if(tempUsedParts.length===0) return '<div style="font-size:12px;color:var(--text-sub);margin-bottom:8px">使用部品なし</div>';
  return tempUsedParts.map((p,i)=>`
    <div class="parts-row">
      <input placeholder="部品名" value="${esc(p.name||'')}" onchange="tempUsedParts[${i}].name=this.value">
      <input placeholder="品番" value="${esc(p.partNo||'')}" onchange="tempUsedParts[${i}].partNo=this.value" style="max-width:90px;">
      <input placeholder="数量" type="number" value="${p.qty||''}" onchange="tempUsedParts[${i}].qty=this.value" style="max-width:60px;">
      <button class="del-btn" onclick="removeUsedPart(${i})">✕</button>
    </div>`).join('');
}

function addUsedPart(){
  tempUsedParts.push({name:'',partNo:'',qty:1});
  document.getElementById('usedPartsList').innerHTML = renderUsedPartsList();
}

function removeUsedPart(i){
  tempUsedParts.splice(i,1);
  document.getElementById('usedPartsList').innerHTML = renderUsedPartsList();
}

// ── フォームヘルパー ──────────────────────────
function inp(id,label,val,type="text",placeholder=""){
  return `<label class="field-label">${label}</label><input type="${type}" id="f_${id}" class="field-input" value="${esc(val||'')}" placeholder="${placeholder}">`;
}
function sel(id,label,options,currentVal){
  return `<div class="fg"><label class="field-label">${label}</label><select id="f_${id}" class="field-select">${options.map(o=>`<option value="${o}" ${currentVal===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
}

// ── 保存・削除 ────────────────────────────────
function saveItem(){
  const btn = document.getElementById("saveItemBtn");
  btn.textContent = "保存中..."; btn.disabled = true;
  const keys = ["","customers","repairs","demos","parts","products"];
  const dbKey = keys[modalState.tab];
  let item = {id: modalState.mode==="new" ? "ID_"+Date.now() : modalState.item.id};

  document.querySelectorAll("#modalBody input:not([type='checkbox']),#modalBody textarea,#modalBody select").forEach(el=>{
    const key = el.id.replace("f_","");
    if(key && !['usedPartsList'].includes(key)) item[key] = el.value;
  });
  const cb = document.getElementById("f_sns_ok");
  if(cb) item.sns_ok = cb.checked;

  // 修理の場合は使用部品を保存
  if(modalState.tab === 2){
    item.usedParts = tempUsedParts.filter(p=>p.name);
  }

  if(modalState.mode==="new") DB[dbKey].push(item);
  else DB[dbKey] = DB[dbKey].map(x=>String(x.id)===String(item.id)?item:x);

  // 製品が納品済になったら売上に加算
  if(dbKey==="products" && item.status==="納品済" && modalState.item.status!=="納品済"){
    DB.settings[0].currentSales = (Number(DB.settings[0].currentSales)||0) + Number(item.price||0);
  }

  saveDB();
  closeModal();
  renderAll();
}

function delItem(){
  if(!confirm("削除しますか？")) return;
  const keys = ["","customers","repairs","demos","parts","products"];
  const dbKey = keys[modalState.tab];
  DB[dbKey] = DB[dbKey].filter(x=>String(x.id)!==String(modalState.item.id));
  saveDB();
  closeModal();
  renderAll();
}

function closeModal(){ document.getElementById("modalOverlay").style.display="none"; }
function closeModalOnBg(e){ if(e.target.id==="modalOverlay") closeModal(); }

function jumpToQuote(){
  const it = modalState.item;
  document.getElementById("toName").value = it.customerName||"";
  let sub = (it.machine||it.targetMachine||"");
  if(it.attachment) sub += " "+it.attachment;
  sub += modalState.tab===2 ? " 修理" : " 導入検討";
  document.getElementById("subject").value = sub;
  if(it.tradeInMachine&&it.tradeInPrice)
    document.getElementById("note").value = `※下取り予定機: ${it.tradeInMachine} (概算充当額: -${it.tradeInPrice}円)`;
  closeModal();
  changeTab(6);
  window.scrollTo(0,0);
}

// ── 見積書 ───────────────────────────────────
const ROWS = 20;
let qItems = Array.from({length:ROWS},()=>({name:"",brand:"",model:"",qty:"",price:"",note:""}));

function initQuote(){
  document.getElementById("estDate").value = new Date().toISOString().slice(0,10);
  const exp = new Date(); exp.setMonth(exp.getMonth()+1);
  document.getElementById("expDate").value = exp.toISOString().slice(0,10);
  buildTable();
}

function clearQuote(){
  if(!confirm("クリアしますか？")) return;
  ["toName","subject","estNo","note","delivPlace","payMethod"].forEach(id=>document.getElementById(id).value="");
  qItems = Array.from({length:ROWS},()=>({name:"",brand:"",model:"",qty:"",price:"",note:""}));
  buildTable();
}

function buildTable(){
  const tbody = document.getElementById("itemsTable");
  while(tbody.rows.length>1) tbody.deleteRow(1);
  for(let i=0;i<ROWS;i++){
    const tr = tbody.insertRow();
    tr.innerHTML = `<td class="tc" style="font-size:11px;color:var(--text-sub);padding:4px 2px;">${i+1}</td>
    <td><input value="${esc(qItems[i].name)}" onchange="qItems[${i}].name=this.value" placeholder="品名"></td>
    <td><input value="${esc(qItems[i].brand)}" onchange="qItems[${i}].brand=this.value" placeholder="銘柄"></td>
    <td><input value="${esc(qItems[i].model)}" onchange="qItems[${i}].model=this.value" placeholder="型式"></td>
    <td><input type="number" class="tr" value="${qItems[i].qty}" onchange="qItems[${i}].qty=this.value;calcTotal()" min="0"></td>
    <td><input type="number" class="tr" value="${qItems[i].price}" onchange="qItems[${i}].price=this.value;calcTotal()" min="0"></td>
    <td class="tr" id="amt_${i}" style="padding:5px 6px;font-size:12px;font-weight:600;color:var(--text);">—</td>
    <td><input value="${esc(qItems[i].note)}" onchange="qItems[${i}].note=this.value" placeholder="備考"></td>`;
  }
  calcTotal();
}

function calcTotal(){
  let sub = 0;
  for(let i=0;i<ROWS;i++){
    const qty = Number(qItems[i].qty)||0, price = Number(qItems[i].price)||0, amt = qty*price;
    const el = document.getElementById("amt_"+i);
    if(el) el.textContent = (qty&&price) ? "¥"+amt.toLocaleString() : "—";
    sub += amt;
  }
  const tax = Math.floor(sub*0.1);
  document.getElementById("subtotal").textContent = "¥"+sub.toLocaleString();
  document.getElementById("tax").textContent = "¥"+tax.toLocaleString();
  document.getElementById("total").textContent = "¥"+(sub+tax).toLocaleString();
}

function esc(s){ return String(s||"").replace(/"/g,"&quot;"); }
function escH(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(d){ if(!d) return ""; const dt = new Date(d), r = dt.getFullYear()-2018; return `令和${r}年${dt.getMonth()+1}月${dt.getDate()}日`; }

function buildEstHTML(){
  const no = document.getElementById("estNo").value||"";
  const date = document.getElementById("estDate").value||"";
  const expDate = document.getElementById("expDate").value||"";
  const delivDate = document.getElementById("delivDate").value||"";
  const delivPlace = document.getElementById("delivPlace").value||"";
  const payMethod = document.getElementById("payMethod").value||"";
  const toName = document.getElementById("toName").value||"";
  const subject = document.getElementById("subject").value||"";
  const note = document.getElementById("note").value||"";
  let sub = 0;
  const rowsHTML = qItems.map((item,i)=>{
    const qty = Number(item.qty)||0, price = Number(item.price)||0, amt = qty*price;
    sub += amt;
    return `<tr><td style="text-align:center;border:1px solid #000;padding:3px;font-size:11px;">${i+1}</td><td style="border:1px solid #000;padding:3px 6px;font-size:11px;">${escH(item.name)}</td><td style="text-align:center;border:1px solid #000;padding:3px;font-size:11px;">${escH(item.brand)}</td><td style="text-align:center;border:1px solid #000;padding:3px;font-size:11px;">${escH(item.model)}</td><td style="text-align:center;border:1px solid #000;padding:3px;font-size:11px;">${qty||""}</td><td style="text-align:right;border:1px solid #000;padding:3px 6px;font-size:11px;">${price?price.toLocaleString():""}</td><td style="text-align:right;border:1px solid #000;padding:3px 6px;font-size:11px;">${amt?amt.toLocaleString():""}</td><td style="border:1px solid #000;padding:3px 6px;font-size:11px;">${escH(item.note)}</td></tr>`;
  }).join('');
  const tax = Math.floor(sub*0.1), total = sub+tax;
  return `<div style="width:794px;min-height:1123px;padding:28px 35px;background:#fff;font-family:'Hiragino Sans','MS PGothic',sans-serif;font-size:12px;color:#000;">${no?`<div style="text-align:right;font-size:11px;margin-bottom:4px;">見積番号：${escH(no)}</div>`:''}<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;"><div style="font-size:26px;font-weight:900;letter-spacing:14px;flex:1;text-align:center;">見　積　書</div><div style="font-size:12px;white-space:nowrap;padding-top:6px;">${fmtDate(date)}</div></div><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div style="flex:1;"><div style="display:flex;align-items:flex-end;border-bottom:1px solid #000;padding-bottom:3px;margin-bottom:8px;min-width:240px;"><span style="font-size:15px;font-weight:700;flex:1;">${escH(toName)}</span><span style="font-size:15px;font-weight:700;margin-left:6px;">様</span></div><div style="font-size:12px;margin-bottom:10px;">下　記　の　通　り　御　見　積　致　し　ま　す　。</div><table style="border-collapse:collapse;font-size:11px;"><tr><td style="padding-right:12px;padding-bottom:4px;">納入期日</td><td style="border-bottom:1px solid #000;min-width:160px;padding-bottom:2px;">${fmtDate(delivDate)}</td></tr><tr><td style="padding-right:12px;padding-bottom:4px;">納入場所</td><td style="border-bottom:1px solid #000;padding-bottom:2px;">${escH(delivPlace)}</td></tr><tr><td style="padding-right:12px;">取引方法</td><td style="border-bottom:1px solid #000;padding-bottom:2px;">${escH(payMethod)}</td></tr></table></div><div style="text-align:left;font-size:11px;line-height:1.8;margin-left:20px;padding-top:10px;">鹿児島県曽於市大隅町岩川5591番地<br>そ　お　鹿　児　島　農　業　協　同　組　合<br>代表理事組合長　　竹　内　和　久<br><strong style="font-size:12px;">財部農機センター</strong></div></div><div style="margin-bottom:10px;"><div style="border:1.5px solid #000;display:inline-block;padding:6px 20px;font-size:13px;font-weight:900;">合計金額　¥　<span style="font-size:16px;">${total.toLocaleString()}</span>　円也<span style="font-size:11px;font-weight:400;margin-left:12px;">（内消費税　${tax.toLocaleString()}　円）</span></div></div>${subject?`<div style="margin-bottom:8px;font-size:12px;">件名：${escH(subject)}</div>`:''}<table style="width:100%;border-collapse:collapse;margin-bottom:0;"><tr><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;width:30px;">No.</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;">品　　名</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;width:70px;">銘　柄</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;width:90px;">型　　式</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;width:40px;">数量</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;width:75px;">単　価</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;width:80px;">金　額</th><th style="border:1px solid #000;padding:5px 3px;text-align:center;font-size:11px;background:#f0f0f0;">備　考</th></tr>${rowsHTML}<tr><td colspan="3" style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">小</td><td colspan="2" style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">計</td><td colspan="2" style="border:1px solid #000;padding:6px;text-align:right;font-size:12px;font-weight:700;">${sub.toLocaleString()}</td><td style="border:1px solid #000;"></td></tr><tr><td colspan="2" style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">消</td><td style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">費</td><td style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">税</td><td style="border:1px solid #000;"></td><td colspan="2" style="border:1px solid #000;padding:6px;text-align:right;font-size:12px;font-weight:700;">${tax.toLocaleString()}</td><td style="border:1px solid #000;"></td></tr><tr><td colspan="3" style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">合</td><td colspan="2" style="border:1px solid #000;padding:6px;text-align:center;font-size:12px;font-weight:700;">計</td><td colspan="2" style="border:1px solid #000;padding:6px;text-align:right;font-size:13px;font-weight:900;">${total.toLocaleString()}</td><td style="border:1px solid #000;"></td></tr></table>${note?`<div style="margin-top:12px;font-size:11px;border:1px solid #ccc;padding:8px;border-radius:4px;"><strong>備考：</strong>${escH(note)}</div>`:''}${expDate?`<div style="margin-top:8px;font-size:11px;color:#555;">有効期限：${fmtDate(expDate)}</div>`:''}</div>`;
}

function showPreview(){ document.getElementById("preview-inner").innerHTML = buildEstHTML(); document.getElementById("preview-modal").style.display = "block"; }
function closePreview(){ document.getElementById("preview-modal").style.display = "none"; }
function getStyles(){ return `*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Hiragino Sans','MS PGothic',sans-serif;}@page{size:A4 portrait;margin:10mm;}`; }
function printDoc(){ const win = window.open('','_blank'); win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${getStyles()}</style></head><body>${buildEstHTML()}</body></html>`); win.document.close(); setTimeout(()=>{win.print();},600); }
function savePDF(){ alert("① 次の印刷画面で\n② 送信先を「PDFに保存」に変更\n③ 保存→Sharpdesk Mobileで印刷できます"); printDoc(); }
function shareDoc(){
  const toName = document.getElementById("toName").value||"";
  const total = document.getElementById("total").textContent;
  const subject = document.getElementById("subject").value||"";
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${getStyles()}</style></head><body>${buildEstHTML()}</body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const file = new File([blob],`見積書_${toName||'draft'}.html`,{type:'text/html'});
  if(navigator.share){
    navigator.share({title:`見積書 ${toName}様`,text:`${subject}\n合計：${total}\n財部農機センター`,files:[file]}).catch(()=>{
      const msg = encodeURIComponent(`【見積書】${toName}様\n${subject}\n合計金額：${total}\n財部農機センター`);
      window.open(`https://line.me/R/msg/text/?${msg}`,'_blank');
    });
  }else{
    const msg = encodeURIComponent(`【見積書】${toName}様\n${subject}\n合計金額：${total}\n財部農機センター`);
    window.open(`https://line.me/R/msg/text/?${msg}`,'_blank');
  }
}

// ── 起動 ────────────────────────────────────
window.onload = () => {
  loadDB();
  initQuote();
  renderAll();
};
